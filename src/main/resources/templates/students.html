<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Student Management System</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background-color: #f4f6f9;
}

/* Navbar */
.navbar {
    background: #ffffff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.navbar-brand {
    font-weight: 600;
    color: #333 !important;
}

/* Container */
.container-box {
    background: #ffffff;
    border-radius: 12px;
    padding: 25px;
    margin-top: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

/* Header */
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Table */
.table {
    margin-top: 15px;
}

.table thead {
    background-color: #f1f3f5;
}

.table th {
    font-weight: 500;
}

.table-hover tbody tr:hover {
    background-color: #f9fafb;
}

/* Buttons */
.btn {
    border-radius: 8px;
    font-size: 14px;
}

.btn-primary {
    background-color: #4f46e5;
    border: none;
}

.btn-primary:hover {
    background-color: #4338ca;
}

.btn-edit {
    background-color: #e0f2fe;
    color: #0369a1;
}

.btn-delete {
    background-color: #fee2e2;
    color: #b91c1c;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 20px;
    color: #888;
    font-size: 14px;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <a class="navbar-brand" href="#">🎓 Student Management System</a>

    <div class="ml-auto">
        <span class="text-muted">Admin Panel</span>
    </div>
</nav>

<div class="container">

    <div class="container-box">

        <!-- Header -->
        <div class="page-header">
            <div>
                <h4 class="mb-0">Students</h4>
                <small class="text-muted">Manage all student records</small>
            </div>

            <a th:href="@{students/new}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Student
            </a>
        </div>

        <!-- Table -->
        <table class="table table-hover">

            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th style="width: 150px;">Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.firstName}"></td>
                    <td th:text="${student.lastName}"></td>
                    <td th:text="${student.email}"></td>

                    <td>
                        <a th:href="@{students/edit/{id}(id=${student.id})}" 
                           class="btn btn-sm btn-edit mr-1">
                           <i class="fas fa-pen"></i>
                        </a>

                        <a th:href="@{/students/delete/{id}(id=${student.id})}" 
                           class="btn btn-sm btn-delete"
                           onclick="return confirm('Are you sure you want to delete this student?');">
                           <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
            </tbody>

        </table>

    </div>

</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 StudentMS • Built for Professional Use</p>
</div>

</body>
</html>
